openapi: 3.0.3
info:
  title: Movie Reservation System API
  version: 1.0.0
  description: OpenAPI specification for the Movie Reservation System backend. Authentication uses HTTP-only cookies named
    `accessToken` and `refreshToken`.
servers:
- url: http://localhost:3000
  description: Local development server
tags:
- name: Health
- name: Auth
- name: Admin
- name: User
- name: Movie
security:
- accessTokenCookie: []
paths:
  /:
    get:
      tags:
      - Health
      summary: Health check
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/auth/google:
    get:
      tags:
      - Auth
      summary: Start Google OAuth login
      responses:
        '302':
          description: Redirects to Google OAuth consent screen
  /api/v1/auth/google/callback:
    get:
      tags:
      - Auth
      summary: Google OAuth callback
      responses:
        '302':
          description: Redirects to frontend OAuth success page
        '500':
          description: OAuth login failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/register:
    post:
      tags:
      - Admin
      summary: Register an admin account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRegisterRequest'
            examples:
              default:
                value:
                  name: Admin Name
                  email: admin@example.com
                  password: secret123
                  role: admin
                  passkey: super-secret-passkey
      responses:
        '201':
          $ref: '#/components/responses/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/admin/login:
    post:
      tags:
      - Admin
      summary: Login as admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: admin@example.com
                  password: secret123
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/admin/auth-me:
    get:
      tags:
      - Admin
      summary: Get the authenticated admin profile
      security:
      - accessTokenCookie: []
      responses:
        '200':
          description: Authenticated admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfileResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/admin/delete:
    delete:
      tags:
      - Admin
      summary: Delete the logged-in admin and their created movies
      security:
      - accessTokenCookie: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/admin/listed-movies:
    get:
      tags:
      - Admin
      summary: Get movies created by the logged-in admin
      security:
      - accessTokenCookie: []
      responses:
        '200':
          description: Admin movie list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMoviesResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/admin/refresh-token:
    post:
      tags:
      - Admin
      summary: Refresh admin access token
      security:
      - refreshTokenCookie: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '405':
          $ref: '#/components/responses/Error'
  /api/v1/admin/logout:
    post:
      tags:
      - Admin
      summary: Logout admin
      security:
      - accessTokenCookie: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/user/register:
    post:
      tags:
      - User
      summary: Register a user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
            examples:
              default:
                value:
                  name: User Name
                  email: user@example.com
                  password: secret123
      responses:
        '201':
          $ref: '#/components/responses/SuccessMessage'
        '409':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/v1/user/login:
    post:
      tags:
      - User
      summary: Login as user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: secret123
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/v1/user/auth-me:
    get:
      tags:
      - User
      summary: Get the authenticated user profile
      security:
      - accessTokenCookie: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/user/delete:
    delete:
      tags:
      - User
      summary: Delete the logged-in user account
      security:
      - accessTokenCookie: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/v1/user/my-bookings:
    get:
      tags:
      - User
      summary: Get the logged-in user's bookings
      security:
      - accessTokenCookie: []
      responses:
        '200':
          description: Bookings list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingsResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/user/cancel-booking/{bookingId}:
    post:
      tags:
      - User
      summary: Cancel a booking
      security:
      - accessTokenCookie: []
      parameters:
      - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelBookingResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/v1/user/refresh-token:
    post:
      tags:
      - User
      summary: Refresh user access token
      security:
      - refreshTokenCookie: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '405':
          $ref: '#/components/responses/Error'
  /api/v1/user/logout:
    post:
      tags:
      - User
      summary: Logout user
      security:
      - accessTokenCookie: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/movie:
    get:
      tags:
      - Movie
      summary: Get paginated movies
      security:
      - accessTokenCookie: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          default: 5
        required: false
      responses:
        '200':
          description: Movie list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Movie'
        '500':
          $ref: '#/components/responses/Error'
  /api/v1/movie/create:
    post:
      tags:
      - Movie
      summary: Create a movie listing
      security:
      - accessTokenCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MovieCreateForm'
            examples:
              default:
                value:
                  title: Inception
                  description: A mind-bending thriller
                  language: English
                  duration: 148
                  poster: (file)
                  trailer: https://example.com/trailer.mp4
                  rating: 8.8
                  price: 250
                  shows: '[{"showTime":"18:00","date":"2026-07-11","screen":"Screen 1","layout":{"rows":10,"columns":15}}]'
      responses:
        '201':
          $ref: '#/components/responses/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/v1/movie/update/{id}:
    put:
      tags:
      - Movie
      summary: Update a movie listing
      security:
      - accessTokenCookie: []
      parameters:
      - $ref: '#/components/parameters/MovieId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MovieUpdateForm'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/movie/delete/{id}:
    delete:
      tags:
      - Movie
      summary: Delete a movie listing
      security:
      - accessTokenCookie: []
      parameters:
      - $ref: '#/components/parameters/MovieId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/movie/available-shows:
    get:
      tags:
      - Movie
      summary: Get available shows for a date
      security:
      - accessTokenCookie: []
      parameters:
      - name: date
        in: query
        required: true
        schema:
          type: string
          example: '2026-07-11'
      responses:
        '200':
          description: Shows available on the selected date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableShow'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/movie/shows/{id}:
    get:
      tags:
      - Movie
      summary: Get all shows for a movie
      security:
      - accessTokenCookie: []
      parameters:
      - $ref: '#/components/parameters/MovieId'
      responses:
        '200':
          description: Movie shows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowsResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/movie/{id}/show/{showId}:
    get:
      tags:
      - Movie
      summary: Get a specific show with seats
      security:
      - accessTokenCookie: []
      parameters:
      - $ref: '#/components/parameters/MovieId'
      - $ref: '#/components/parameters/ShowId'
      responses:
        '200':
          description: Single show details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/movie/{id}/show/{showId}/hold:
    post:
      tags:
      - Movie
      summary: Hold seats for a show
      security:
      - accessTokenCookie: []
      parameters:
      - $ref: '#/components/parameters/MovieId'
      - $ref: '#/components/parameters/ShowId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeatSelectionRequest'
            examples:
              default:
                value:
                  seatNumber:
                  - A1
                  - A2
      responses:
        '200':
          description: Seats held successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldSeatResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/movie/{id}/show/{showId}/book:
    post:
      tags:
      - Movie
      summary: Book seats for a show
      security:
      - accessTokenCookie: []
      parameters:
      - $ref: '#/components/parameters/MovieId'
      - $ref: '#/components/parameters/ShowId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeatSelectionRequest'
            examples:
              default:
                value:
                  seatNumber:
                  - A1
                  - A2
      responses:
        '200':
          description: Seats booked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookSeatResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: accessToken
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refreshToken
  parameters:
    MovieId:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 24
        maxLength: 24
    ShowId:
      name: showId
      in: path
      required: true
      schema:
        type: string
        minLength: 24
        maxLength: 24
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        minLength: 24
        maxLength: 24
  responses:
    SuccessMessage:
      description: Operation successful
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessMessage'
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      properties:
        message:
          type: string
          example: All Set
      required:
      - message
      additionalProperties: false
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Account Created
      required:
      - success
      - message
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Unexpected Error
      required:
      - success
      - message
      additionalProperties: true
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
    AdminRegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum:
          - admin
        passkey:
          type: string
      required:
      - name
      - email
      - password
      - role
      - passkey
    UserRegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - name
      - email
      - password
    UserLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          description: Optional role field used by the login controller
      required:
      - email
      - password
    UserProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - success
      - message
      - user
    AdminProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/Admin'
      required:
      - success
      - message
      - user
    BookingsResponse:
      type: object
      properties:
        bookings:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
      required:
      - bookings
    CancelBookingResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        cancelledSeats:
          type: array
          items:
            type: string
        refundAmount:
          type: number
      required:
      - success
      - message
      - cancelledSeats
      - refundAmount
    AdminMoviesResponse:
      type: object
      properties:
        movies:
          type: array
          items:
            $ref: '#/components/schemas/Movie'
      required:
      - movies
    ShowsResponse:
      type: object
      properties:
        message:
          type: string
          example: Success
        success:
          type: boolean
          example: true
        shows:
          type: array
          items:
            $ref: '#/components/schemas/Show'
      required:
      - message
      - success
      - shows
    ShowResponse:
      type: object
      properties:
        message:
          type: string
          example: Success
        success:
          type: boolean
          example: true
        show:
          $ref: '#/components/schemas/Show'
      required:
      - message
      - success
      - show
    HoldSeatResponse:
      type: object
      properties:
        message:
          type: string
          example: Seat held successfully
        success:
          type: boolean
          example: true
        seats:
          type: object
      required:
      - message
      - success
      - seats
    BookSeatResponse:
      type: object
      properties:
        message:
          type: string
          example: Seat booked successfully
        success:
          type: boolean
          example: true
        booking:
          type: object
          properties:
            movieId:
              type: string
            showId:
              type: string
            seats:
              type: array
              items:
                type: object
            totalPrice:
              type: number
            status:
              type: string
              example: Confirmed
            qr:
              type: string
      required:
      - message
      - success
      - booking
    MovieCreateForm:
      type: object
      required:
      - title
      - description
      - duration
      - price
      - shows
      properties:
        title:
          type: string
        description:
          type: string
        language:
          type: string
        duration:
          type: integer
        poster:
          type: string
          format: binary
        trailer:
          type: string
        rating:
          type: number
        price:
          type: number
        shows:
          type: string
          description: JSON-stringified array of show objects. The server parses this field before validation.
    MovieUpdateForm:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
        description:
          type: string
        language:
          type: string
        duration:
          type: integer
        poster:
          type: string
          format: binary
        trailer:
          type: string
        rating:
          type: number
        price:
          type: number
        shows:
          type: string
          description: JSON-stringified array of show objects.
    SeatSelectionRequest:
      type: object
      properties:
        seatNumber:
          type: array
          minItems: 1
          items:
            type: string
      required:
      - seatNumber
    AvailableShow:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        duration:
          type: number
        price:
          type: number
        rating:
          type: number
        shows:
          $ref: '#/components/schemas/Show'
      required:
      - title
      - duration
      - price
      - rating
      - shows
    Movie:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        language:
          type: string
        duration:
          type: number
        trailer:
          type:
          - string
          - 'null'
        poster:
          type: string
        rating:
          type: number
        price:
          type: number
        createdBy:
          type: string
        shows:
          type: array
          items:
            $ref: '#/components/schemas/Show'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Show:
      type: object
      properties:
        _id:
          type: string
        showTime:
          type: string
          example: '18:00'
        date:
          type: string
          example: '2026-07-11'
        totalSeats:
          type: integer
        screen:
          type: string
        layout:
          type: object
          properties:
            rows:
              type: integer
            columns:
              type: integer
        seats:
          type: array
          items:
            $ref: '#/components/schemas/Seat'
        availableSeats:
          type: integer
        occupiedSeats:
          type: integer
        lockedSeats:
          type: integer
    Seat:
      type: object
      properties:
        _id:
          type: string
        seatNumber:
          type: string
        row:
          type: string
        column:
          type: integer
        seatType:
          type: string
        status:
          type: string
        priceMultiplier:
          type: number
        lockedBy:
          type:
          - string
          - 'null'
        lockedExpires:
          type:
          - string
          - 'null'
          format: date-time
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar:
          type: string
        provider:
          type: string
        providerId:
          type:
          - string
          - 'null'
        role:
          type: string
        bookings:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Admin:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        movies:
          type: array
          items:
            $ref: '#/components/schemas/Movie'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Booking:
      type: object
      properties:
        _id:
          type: string
        movie:
          type: string
        seats:
          type: array
          items:
            $ref: '#/components/schemas/BookingSeat'
        showId:
          type: string
        status:
          type: string
          enum:
          - Confirmed
          - Cancelled
          - Hold
          - Expired
        totalPrice:
          type: number
        bookedAt:
          type: string
          format: date-time
        tickettoken:
          type:
          - string
          - 'null'
