openapi: 3.0.3
info:
  title: Movie Booking & Reservation System API
  version: 1.0.0
  description: >
    REST API for managing users, administrators, movie listings, show schedules,
    and ticket bookings. Authentication is handled using a JWT stored in an
    HTTP-only cookie named `token`.

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Health
  - name: Admin
  - name: User
  - name: Movie

security:
  - cookieAuth: []

paths:
  /:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /admin/register:
    post:
      tags: [Admin]
      summary: Register an admin account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRegisterRequest"
            examples:
              default:
                value:
                  name: Admin Name
                  email: admin@example.com
                  password: secret123
                  role: admin
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Unauthorized admin creation attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      tags: [Admin]
      summary: Login as admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              default:
                value:
                  email: admin@example.com
                  password: secret123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid credentials or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      tags: [Admin]
      summary: Logout admin
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /admin/delete:
    delete:
      tags: [Admin]
      summary: Delete the logged-in admin and all movies created by that admin
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Admin deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/listed-movies:
    get:
      tags: [Admin]
      summary: Get movies created by the logged-in admin
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of movies
          content:
            application/json:
              schema:
                type: object
                properties:
                  movies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Movie"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/register:
    post:
      tags: [User]
      summary: Register a user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterRequest"
            examples:
              default:
                value:
                  name: User Name
                  email: user@example.com
                  password: secret123
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/login:
    post:
      tags: [User]
      summary: Login as user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid credentials or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Unauthorized admin-role attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/logout:
    post:
      tags: [User]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /user/delete:
    delete:
      tags: [User]
      summary: Delete the logged-in user account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/my-bookings:
    get:
      tags: [User]
      summary: Get booking history for the logged-in user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Booking list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/cancel-booking/{bookingId}:
    post:
      tags: [User]
      summary: Cancel a booking
      security:
        - cookieAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
          description: Booking document id
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Booking already cancelled or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movie:
    get:
      tags: [Movie]
      summary: Get all movies
      responses:
        "200":
          description: Movie list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"
        "400":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movie/add:
    post:
      tags: [Movie]
      summary: Create a movie listing
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieCreateRequest"
            examples:
              default:
                value:
                  title: Example Movie
                  description: A sample movie description
                  language: English
                  duration: 120
                  rating: 4.5
                  price: 199
                  shows:
                    - showTime: "18:30"
                      date: "2026-06-25"
                      totalSeats: 100
                      availableSeats: 100
                      screen: Screen 1
      responses:
        "201":
          description: Movie added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation or creation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movie/edit/{id}:
    put:
      tags: [Movie]
      summary: Update a movie listing
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieUpdateRequest"
      responses:
        "200":
          description: Movie updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request or unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Movie not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movie/delete/{id}:
    delete:
      tags: [Movie]
      summary: Delete a movie listing
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Movie deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Movie not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movie/shows:
    get:
      tags: [Movie]
      summary: Get available shows for a given date
      security:
        - cookieAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            example: "2026-06-25"
      responses:
        "200":
          description: Available shows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableShow"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movie/bookings:
    post:
      tags: [Movie]
      summary: Book seats for a show
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookShowRequest"
            examples:
              default:
                value:
                  movieId: 66a111111111111111111111
                  showId: 66b222222222222222222222
                  seats: 2
      responses:
        "200":
          description: Show booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request or insufficient seats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Movie, show, or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /movie/owner/{id}:
    get:
      tags: [Movie]
      summary: Get the owner (admin) of a movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Movie owner
          content:
            application/json:
              schema:
                type: object
                properties:
                  owner:
                    $ref: "#/components/schemas/AdminPublic"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  schemas:
    HealthResponse:
      type: object
      properties:
        message:
          type: string
          example: All Set

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
      required: [success, message]

    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logged out

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
      required: [success, message]

    AuthSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        token:
          type: string
      required: [success, message, token]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AdminRegisterRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin]

    UserRegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AdminPublic:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user]

    MovieCreateRequest:
      type: object
      required: [title, description, duration, price]
      properties:
        title:
          type: string
        description:
          type: string
        language:
          type: string
          example: Hindi
        duration:
          type: number
        rating:
          type: number
        price:
          type: number
        shows:
          type: array
          items:
            $ref: "#/components/schemas/ShowInput"

    MovieUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        language:
          type: string
        duration:
          type: number
        rating:
          type: number
        price:
          type: number
        shows:
          type: array
          items:
            $ref: "#/components/schemas/ShowInput"

    ShowInput:
      type: object
      required: [showTime, date, totalSeats, availableSeats]
      properties:
        showTime:
          type: string
          example: "18:30"
        date:
          type: string
          example: "2026-06-25"
        totalSeats:
          type: integer
        availableSeats:
          type: integer
        screen:
          type: string

    Movie:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        language:
          type: string
        duration:
          type: number
        rating:
          type: number
        price:
          type: number
        createdBy:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/AdminPublic"
        shows:
          type: array
          items:
            $ref: "#/components/schemas/Show"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Show:
      type: object
      properties:
        _id:
          type: string
        showTime:
          type: string
        date:
          type: string
        totalSeats:
          type: integer
        availableSeats:
          type: integer
        screen:
          type: string

    AvailableShow:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        duration:
          type: number
        price:
          type: number
        rating:
          type: number
        shows:
          $ref: "#/components/schemas/Show"

    Booking:
      type: object
      properties:
        _id:
          type: string
        movie:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/Movie"
        seats:
          type: integer
        showId:
          type: string
        status:
          type: string
          enum: [Confirmed, Cancelled]

    BookShowRequest:
      type: object
      required: [movieId, showId, seats]
      properties:
        movieId:
          type: string
        showId:
          type: string
        seats:
          type: integer
          minimum: 1
          maximum: 10
